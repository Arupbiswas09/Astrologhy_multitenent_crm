name: CI/CD

# Pipeline: verify (lint+test+build) on every push/PR →
# on main: deploy CMS stack to the VPS + seed (idempotent) → deploy web to Vercel.
#
# Deploy jobs self-skip until their secrets exist. Required repo secrets:
#   VPS_SSH_KEY        private key authorized on the VPS (CI-dedicated)
#   VPS_HOST           e.g. 217.76.48.139
#   DIRECTUS_URL       e.g. https://cms.217-76-48-139.sslip.io
#   DIRECTUS_ADMIN_TOKEN / DIRECTUS_WEB_TOKEN / DIRECTUS_LEADS_TOKEN   (seed)
#   WEB_URL            public URL of the web app (health check)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm test

      - run: pnpm build
        env:
          # Build must succeed without a reachable CMS (ISR pages fall back to
          # on-demand rendering; see docs/02-ARCHITECTURE.md §5).
          DIRECTUS_URL: http://localhost:8055
          DIRECTUS_STATIC_TOKEN: ci-placeholder
          REPORT_TOKEN_SECRET: ci-placeholder-secret-32-bytes-min!!!
          DEFAULT_TENANT: astro-note

  deploy-cms:
    name: Deploy CMS → VPS
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency: deploy-cms
    steps:
      - uses: actions/checkout@v4

      - name: Gate on secrets
        id: gate
        run: echo "ok=${{ secrets.VPS_SSH_KEY != '' && secrets.VPS_HOST != '' }}" >> "$GITHUB_OUTPUT"

      - name: Set up SSH
        if: steps.gate.outputs.ok == 'true'
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync stack files & apply
        if: steps.gate.outputs.ok == 'true'
        run: |
          scp -i ~/.ssh/deploy_key cms/docker-compose.yml cms/Caddyfile \
            "root@${{ secrets.VPS_HOST }}:/opt/astro-note/"
          ssh -i ~/.ssh/deploy_key "root@${{ secrets.VPS_HOST }}" \
            "cd /opt/astro-note && docker compose --profile production up -d --remove-orphans"

      - uses: pnpm/action-setup@v4
        if: steps.gate.outputs.ok == 'true'

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.ok == 'true'
        with:
          node-version: 22
          cache: pnpm

      - name: Seed CMS (idempotent — never overwrites CMS edits)
        if: steps.gate.outputs.ok == 'true'
        env:
          DIRECTUS_URL: ${{ secrets.DIRECTUS_URL }}
          DIRECTUS_ADMIN_TOKEN: ${{ secrets.DIRECTUS_ADMIN_TOKEN }}
          DIRECTUS_WEB_TOKEN: ${{ secrets.DIRECTUS_WEB_TOKEN }}
          DIRECTUS_LEADS_TOKEN: ${{ secrets.DIRECTUS_LEADS_TOKEN }}
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @astro-note/cms-sdk seed

      - name: Health check
        if: steps.gate.outputs.ok == 'true'
        run: |
          curl -sf --max-time 15 "${{ secrets.DIRECTUS_URL }}/server/health" | grep -q '"ok"'
          echo "CMS healthy"

  deploy-web:
    name: Deploy web → VPS (Docker behind Caddy/Cloudflare)
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency: deploy-web
    steps:
      - uses: actions/checkout@v4

      - name: Gate on secrets
        id: gate
        run: echo "ok=${{ secrets.VPS_SSH_KEY != '' && secrets.VPS_HOST != '' }}" >> "$GITHUB_OUTPUT"

      - name: Set up SSH
        if: steps.gate.outputs.ok == 'true'
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync source & stack file
        if: steps.gate.outputs.ok == 'true'
        run: |
          rsync -az --delete --exclude .git \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ "root@${{ secrets.VPS_HOST }}:/opt/astro-note-web/src/"
          scp -i ~/.ssh/deploy_key cms/web-compose.yml \
            "root@${{ secrets.VPS_HOST }}:/opt/astro-note-web/docker-compose.yml"

      - name: Build & roll the container
        if: steps.gate.outputs.ok == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key "root@${{ secrets.VPS_HOST }}" \
            "cd /opt/astro-note-web && docker compose build --pull && docker compose up -d && docker image prune -f"

      - name: Health check
        if: steps.gate.outputs.ok == 'true'
        run: |
          sleep 8
          curl -sf --max-time 20 "${{ secrets.WEB_URL }}/" -o /dev/null
          echo "web healthy at ${{ secrets.WEB_URL }}"
