name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm test

      - run: pnpm build
        env:
          # Build must succeed without a reachable CMS (ISR pages fall back to
          # on-demand rendering; see docs/02-ARCHITECTURE.md §5).
          DIRECTUS_URL: http://localhost:8055
          DIRECTUS_STATIC_TOKEN: ci-placeholder
          REPORT_TOKEN_SECRET: ci-placeholder-secret-32-bytes-min!!!
          DEFAULT_TENANT: astro-note
